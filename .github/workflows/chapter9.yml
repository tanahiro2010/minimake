name: Chapter 9 - Parallel Build

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}/src
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Test group_by_level
        run: python tests/test_group_by_level.py

      - name: Test parallel build
        working-directory: project
        run: bash ../tests/test_parallel_build.sh
